<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGUS | Gold Standard Matrix</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-color: #0b0b0e;
            --card-bg: #16161a;
            --accent: #00d4ff; 
            --box-bg: rgba(10, 10, 12, 0.92);
            --danger: #ff4444;
            --text: #e0e0e0;
        }
        body { margin: 0; background-color: var(--bg-color); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .toolbar { height: 60px; background: #1c1c21; display: flex; align-items: center; padding: 0 20px; gap: 12px; border-bottom: 1px solid #333; z-index: 1000; position: relative; }
        .toolbar h2 { margin: 0; font-size: 1.1rem; letter-spacing: 4px; color: var(--accent); font-weight: 900; text-transform: uppercase; }
        
        .ist-clock { background: #000; padding: 5px 12px; border-radius: 4px; border: 1px solid #444; font-family: monospace; color: #fff; font-size: 14px; min-width: 130px; text-align: center; }
        .ist-label { color: var(--accent); font-size: 9px; display: block; letter-spacing: 1px; margin-bottom: 2px; }

        #videoContainer { 
            display: grid; gap: 6px; padding: 6px; 
            height: calc(100vh - 60px); width: 100vw; 
            box-sizing: border-box; align-content: stretch;
            transition: all 0.3s ease;
        }

        .video-card { 
            background: var(--card-bg); border: 2px solid #222; position: relative; 
            border-radius: 4px; overflow: hidden; display: flex; flex-direction: column;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        @keyframes pulse-red {
            0% { box-shadow: 0 0 5px rgba(255, 68, 68, 0.5); border-color: rgba(255, 68, 68, 0.8); }
            50% { box-shadow: 0 0 20px rgba(255, 68, 68, 1); border-color: rgba(255, 68, 68, 1); }
            100% { box-shadow: 0 0 5px rgba(255, 68, 68, 0.5); border-color: rgba(255, 68, 68, 0.8); }
        }
        
        .video-card.recovering { animation: pulse-red 1s infinite; z-index: 10; }
        .video-card.hidden { display: none; }
        .video-card.solo { position: fixed; top: 60px; left: 0; width: 100vw !important; height: calc(100vh - 60px) !important; z-index: 500; border: 3px solid var(--accent); box-shadow: 0 0 30px rgba(0, 212, 255, 0.5); }
        
        video { width: 100%; height: 100%; background: #000; object-fit: contain; flex-grow: 1; }

        .end-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 5; pointer-events: none;
            font-weight: 900; color: #fff; font-size: 16px; letter-spacing: 3px;
            text-shadow: 0 0 10px var(--danger);
        }
        .video-card.ended .end-screen { display: flex; }
        .video-card.ended video { opacity: 0.05; filter: grayscale(1); }

        .overlay-controls { 
            position: absolute; top: 8px; left: 8px; display: flex; flex-direction: column; z-index: 10; 
            pointer-events: none; background: var(--box-bg); backdrop-filter: blur(8px);
            padding: 8px 10px; width: 180px; border-left: 3px solid var(--accent); border-radius: 0 4px 4px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .edit-input, .event-log, .track-select, .url-input, .btn-kill { pointer-events: auto !important; }
        .edit-input { background: transparent; border: none; color: var(--accent); outline: none; font-size: 11px; width: 100%; text-transform: uppercase; font-weight: 800; }
        .event-log { color: var(--text); font-family: monospace; font-size: 10px; border: none; background: transparent; outline: none; margin-top: 2px; }
        
        .track-select { background: #000; border: 1px solid #444; color: #00ffaa; font-size: 9px; border-radius: 2px; padding: 2px; width: 100%; margin-top: 6px; cursor: pointer; display: none; }
        .hover-row { display: none; gap: 4px; margin-top: 8px; pointer-events: auto; }
        .video-card:hover .hover-row { display: flex; }
        .url-input { background: #000; border: 1px solid #333; color: #777; font-size: 9px; padding: 2px 4px; flex-grow: 1; outline: none; }
        .btn-kill { background: #200; color: var(--danger); border: 1px solid var(--danger); font-size: 9px; cursor: pointer; padding: 2px 5px; font-weight: bold; }
        .btn-kill.active { background: #020; color: #0f0; border-color: #0f0; }

        .btn-master { background: #2a2a30; color: #fff; border: 1px solid #444; padding: 6px 12px; border-radius: 4px; font-size: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-master:hover { border-color: var(--accent); background: #333; }
    </style>
</head>
<body>

<div class="toolbar">
    <h2>ARGUS</h2>
    <div class="ist-clock">
        <span class="ist-label">IST LIVE</span>
        <div id="istClockDisplay">00:00:00</div>
    </div>
    <div style="display: flex; gap: 8px; align-items: center; flex-grow: 1; justify-content: flex-end;">
        <select id="layoutSelect" class="btn-master" onchange="changeLayout(this.value)">
            <option value="1">1 FEED</option><option value="2">2 FEEDS</option><option value="3">3 FEEDS</option>
            <option value="4">4 FEEDS</option><option value="6">6 FEEDS</option><option value="9">9 FEEDS</option>
            <option value="12">12 FEEDS (MATRIX)</option>
        </select>
        <select id="masterQuality" class="btn-master" onchange="setGlobalQuality(this.value)" style="color:var(--accent); border-color:var(--accent)">
            <option value="auto">QUALITY: AUTO</option>
            <option value="high">QUALITY: MAX</option>
            <option value="low">QUALITY: DATA SAVER</option>
        </select>
        <button class="btn-master" onclick="playAll()">PLAY ALL</button>
        <button class="btn-master" onclick="muteAll()">MUTE ALL</button>
        <button class="btn-master" onclick="refreshAll()">REFRESH</button>
        <button class="btn-master" style="background:#500; border-color:#f44" onclick="clearSavedData()">RESET</button>
    </div>
</div>

<div id="videoContainer"></div>

<script>
    const defaultStream = "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8";
    const hlsInstances = [];
    const lastVideoTime = Array(12).fill(0);
    const lastRealTime = Array(12).fill(Date.now());
    let saveTimeout;

    function updateClock() {
        document.getElementById('istClockDisplay').textContent = new Date().toLocaleTimeString('en-GB', { timeZone: 'Asia/Kolkata', hour12: false });
    }
    setInterval(updateClock, 1000);

    function forcePlay(video) {
        if (video.paused) {
            video.play().catch(() => {
                setTimeout(() => video.play().catch(()=>{}), 100);
            });
        }
    }

    window.onload = () => {
        const savedLayout = localStorage.getItem('argus-layout-count') || "12";
        const savedQuality = localStorage.getItem('argus-global-quality') || "auto";
        
        document.getElementById('layoutSelect').value = savedLayout;
        document.getElementById('masterQuality').value = savedQuality;

        const container = document.getElementById('videoContainer');
        for (let i = 0; i < 12; i++) {
            const data = {
                name: localStorage.getItem(`argus-name-${i}`) || `CAMERA ${i+1}`,
                time: localStorage.getItem(`argus-time-${i}`) || `00:00:00`,
                url:  localStorage.getItem(`argus-url-${i}`)  || defaultStream,
                ended: localStorage.getItem(`argus-ended-${i}`) === 'true'
            };

            const card = document.createElement('div');
            card.className = `video-card ${data.ended ? 'ended' : ''}`;
            card.id = `card-${i}`;
            card.innerHTML = `
                <div class="end-screen">MATCH ENDED</div>
                <div class="overlay-controls" id="controls-${i}">
                    <input type="text" class="edit-input" value="${data.name}" oninput="debouncedSave(${i}, 'name', this.value)">
                    <input type="text" class="event-log" value="${data.time}" oninput="debouncedSave(${i}, 'time', this.value)">
                    <select id="audio-${i}" class="track-select" onchange="switchAudio(${i}, this.value)"></select>
                    <div class="hover-row">
                        <input type="text" class="url-input" value="${data.url}" onchange="updateStreamUrl(${i}, this.value)">
                        <button class="btn-kill ${data.ended ? 'active' : ''}" onclick="toggleEndScreen(${i})">${data.ended ? 'RESTORE' : 'MATCH ENDED'}</button>
                    </div>
                </div>
                <video id="video-${i}" muted autoplay playsinline controls crossorigin="anonymous" ondblclick="toggleSolo(${i})"></video>
            `;
            container.appendChild(card);
            setupHls(document.getElementById(`video-${i}`), data.url, i, data.ended);
        }
        changeLayout(savedLayout);
    };

    function setupHls(video, url, index, isEnded) {
        if (hlsInstances[index]) { hlsInstances[index].destroy(); hlsInstances[index] = null; }
        if (Hls.isSupported()) {
            const hls = new Hls({ capLevelToPlayerSize: true, manifestLoadingMaxRetry: 20, manifestLoadingRetryDelay: 1000, liveSyncDurationCount: 3 });
            hls.loadSource(url);
            hls.attachMedia(video);
            hlsInstances[index] = hls;

            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                // Apply saved quality once manifest is ready
                const mode = localStorage.getItem('argus-global-quality') || "auto";
                applyQualityToInstance(hls, mode);
                if(!isEnded) forcePlay(video); 
            });

            hls.on(Hls.Events.ERROR, (event, data) => { if (data.fatal) handleHardReset(index); });
            hls.on(Hls.Events.AUDIO_TRACKS_UPDATED, () => updateTrackMenus(index));
        }
    }

    function applyQualityToInstance(hls, mode) {
        if (!hls || hls.levels.length <= 1) return;
        if (mode === 'high') hls.currentLevel = hls.levels.length - 1;
        else if (mode === 'low') hls.currentLevel = 0;
        else hls.currentLevel = -1; // Auto
    }

    function setGlobalQuality(mode) {
        localStorage.setItem('argus-global-quality', mode);
        hlsInstances.forEach(hls => applyQualityToInstance(hls, mode));
    }

    function handleHardReset(idx) {
        const v = document.getElementById(`video-${idx}`);
        const card = document.getElementById(`card-${idx}`);
        const url = localStorage.getItem(`argus-url-${idx}`) || defaultStream;
        card.classList.add('recovering');
        setupHls(v, url, idx, false);
        lastVideoTime[idx] = v.currentTime;
        lastRealTime[idx] = Date.now();
        setTimeout(() => { forcePlay(v); card.classList.remove('recovering'); }, 2500);
    }

    setInterval(() => {
        hlsInstances.forEach((hls, i) => {
            const v = document.getElementById(`video-${i}`);
            const card = document.getElementById(`card-${i}`);
            if (!card.classList.contains('ended') && !card.classList.contains('hidden')) {
                if (hls && hls.liveSyncPosition) {
                    const drift = Math.abs(hls.liveSyncPosition - v.currentTime);
                    if (drift > 2) { v.currentTime = hls.liveSyncPosition; forcePlay(v); }
                }
                const now = Date.now();
                if (v.currentTime === lastVideoTime[i]) {
                    if (now - lastRealTime[i] > 4000) handleHardReset(i);
                    else forcePlay(v);
                } else {
                    lastVideoTime[i] = v.currentTime;
                    lastRealTime[i] = now;
                }
                if (v.paused) forcePlay(v);
            }
        });
    }, 5000);

    function changeLayout(count) {
        localStorage.setItem('argus-layout-count', count);
        const cards = document.querySelectorAll('.video-card');
        count = parseInt(count);
        let cols = count === 1 ? 1 : count <= 4 ? 2 : count <= 9 ? 3 : 4;
        let rows = count === 1 ? 1 : count <= 2 ? 1 : count <= 6 ? 2 : 3;
        document.getElementById('videoContainer').style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        document.getElementById('videoContainer').style.gridTemplateRows = `repeat(${rows}, 1fr)`;
        cards.forEach((card, i) => {
            const v = document.getElementById(`video-${i}`);
            if (i < count) { card.classList.remove('hidden'); if(!card.classList.contains('ended')) forcePlay(v); }
            else { card.classList.add('hidden'); v.pause(); }
        });
    }

    function toggleEndScreen(idx) { 
        const card = document.getElementById(`card-${idx}`);
        const v = document.getElementById(`video-${idx}`);
        const btn = card.querySelector('.btn-kill');
        card.classList.toggle('ended');
        const state = card.classList.contains('ended');
        localStorage.setItem(`argus-ended-${idx}`, state);
        if (state) { v.pause(); if (hlsInstances[idx]) hlsInstances[idx].stopLoad(); }
        else { setupHls(v, localStorage.getItem(`argus-url-${idx}`) || defaultStream, idx, false); }
        btn.textContent = state ? 'RESTORE' : 'MATCH ENDED';
        btn.classList.toggle('active', state);
    }

    function updateTrackMenus(idx) {
        const hls = hlsInstances[idx];
        const am = document.getElementById(`audio-${idx}`);
        if (hls && hls.audioTracks && hls.audioTracks.length > 1) {
            am.style.display = 'block';
            am.innerHTML = hls.audioTracks.map((t, i) => `<option value="${i}" ${hls.audioTrack === i ? 'selected' : ''}>${t.name.toUpperCase()}</option>`).join('');
        }
    }

    function debouncedSave(id, type, val) {
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => localStorage.setItem(`argus-${type}-${id}`, val), 500);
    }
    function updateStreamUrl(idx, url) { localStorage.setItem(`argus-url-${idx}`, url); setupHls(document.getElementById(`video-${idx}`), url, idx, false); }
    function switchAudio(idx, id) { if(hlsInstances[idx]) hlsInstances[idx].audioTrack = parseInt(id); }
    function toggleSolo(idx) { document.getElementById(`card-${idx}`).classList.toggle('solo'); }
    function playAll() { document.querySelectorAll('video').forEach((v, i) => { if(!document.getElementById(`card-${i}`).classList.contains('ended')) forcePlay(v); }); }
    function muteAll() { document.querySelectorAll('video').forEach(v => v.muted = true); }
    function refreshAll() { location.reload(); }
    function clearSavedData() { if(confirm("Wipe all settings?")) { localStorage.clear(); location.reload(); } }
</script>
</body>

</html>
